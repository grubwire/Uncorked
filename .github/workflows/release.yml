name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install swiftlint create-dmg

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme Uncorked \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Uncorked.xcarchive" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Uncorked.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions-unsigned.plist

      - name: Ad-hoc sign
        run: |
          APP="$RUNNER_TEMP/export/Uncorked.app"
          # Sign nested bundles (frameworks, dylibs, app extensions) inside-out first
          find "$APP" \( -name "*.framework" -o -name "*.dylib" -o -name "*.appex" \) \
            | sort -r \
            | xargs -I{} codesign --force --options runtime --sign - "{}"
          # Sign the outer app bundle last
          codesign --force --options runtime --sign - "$APP"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Uncorked" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Uncorked.app" 200 185 \
            --hide-extension "Uncorked.app" \
            --app-drop-link 460 185 \
            "$RUNNER_TEMP/Uncorked-${{ github.ref_name }}.dmg" \
            "$RUNNER_TEMP/export/"
          # Stable filename copy: lets grubwire.io link directly to the latest
          # via https://github.com/grubwire/uncorked/releases/latest/download/Uncorked.dmg
          cp "$RUNNER_TEMP/Uncorked-${{ github.ref_name }}.dmg" "$RUNNER_TEMP/Uncorked.dmg"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: true
          generate_release_notes: true
          files: |
            ${{ runner.temp }}/Uncorked-${{ github.ref_name }}.dmg
            ${{ runner.temp }}/Uncorked.dmg
