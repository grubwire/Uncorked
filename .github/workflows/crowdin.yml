name: Crowdin sync

# Pushes English source strings up to Crowdin, pulls translated strings
# down as a pull request. Runs daily and on demand.
#
# Requires repository secrets:
#   CROWDIN_PROJECT_ID       - numeric project ID from the Crowdin project URL
#   CROWDIN_PERSONAL_TOKEN   - personal access token with project read/write

on:
  push:
    branches: [main]
    paths:
      - 'Crosswire/Localizable.xcstrings'
      - 'crowdin.yml'
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Crowdin push and pull
        uses: crowdin/github-action@v2
        with:
          config: crowdin.yml
          upload_sources: true
          upload_translations: false
          download_translations: true
          localization_branch_name: crowdin/translations
          create_pull_request: true
          pull_request_title: 'i18n: pull latest translations from Crowdin'
          pull_request_body: |
            Automated translation sync from Crowdin.

            Review the diff in `Crosswire/Localizable.xcstrings` and merge when
            the new translation states look right.
          pull_request_labels: i18n,automated
          pull_request_base_branch_name: main
          commit_message: 'i18n: sync translations from Crowdin'
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
